services:
  # === RabbitMQ (Message Queue) ===
  rabbitmq:
    image: rabbitmq:3-management
    container_name: prn232-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - prn232-network
    restart: unless-stopped

  # === API Gateway ===
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: prn232-api-gateway
    ports:
      - "5092:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOCKER_ENV=true
    depends_on:
      - user-service
      - order-service
      - inventory-service
      - payment-service
      - notification-service
      - balance-service
      - transaction-service
    networks:
      - prn232-network
    restart: unless-stopped

  # === User Service ===
  user-service:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    container_name: prn232-user-service
    ports:
      - "5209:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

  # === Order Service ===
  order-service:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    container_name: prn232-order-service
    ports:
      - "5267:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

  # === Inventory Service ===
  inventory-service:
    build:
      context: .
      dockerfile: InventoryService/Dockerfile
    container_name: prn232-inventory-service
    ports:
      - "5254:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

  # === Payment Service (Wallet) ===
  payment-service:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    container_name: prn232-payment-service
    ports:
      - "5253:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

  # === Notification Service (Mới) ===
  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: prn232-notification-service
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

  # === Balance Service (Mới) ===
  balance-service:
    build:
      context: .
      dockerfile: BalanceService/Dockerfile
    container_name: prn232-balance-service
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

  # === Transaction Service (Mới - Event Sourcing) ===
  transaction-service:
    build:
      context: .
      dockerfile: TransactionService/Dockerfile
    container_name: prn232-transaction-service
    ports:
      - "5300:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - prn232-network
    restart: unless-stopped

networks:
  prn232-network:
    driver: bridge
